# LOCAL DEVELOPMENT ONLY
# ========================
# This compose file runs a minimal local stack for development and testing.
# In production, use ECS Fargate (see ecs/task-definition.json) and
# CloudWatch for metrics (Prometheus is no longer used in production).
#
# Start:  docker-compose up -d
# Stop:   docker-compose down

version: "3.9"

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Grafana for local dashboard development.
  # In production, use CloudWatch Dashboards (config/cloudwatch_dashboard.json).
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    profiles:
      - monitoring

volumes:
  mlflow_data:
  grafana_data:
