# Model Serving Workflow
# ======================
# Tests the FastAPI prediction server and deploys to ECS on success.
#
# Required GitHub Actions secrets:
#   AWS_ROLE_ARN — IAM role with ECS update-service permissions
# Required GitHub Actions variables:
#   AWS_REGION, ECS_CLUSTER, ECS_SERVICE

name: Test Serving Layer

on:
  push:
    paths:
      - "src/loan_risk/serving/**"
      - "tests/integration/test_api.py"
      - ".github/workflows/serve.yml"
      - "ecs/task-definition.json"
      - "Dockerfile"
  pull_request:
    paths:
      - "src/loan_risk/serving/**"
      - "tests/integration/test_api.py"

jobs:
  test-api:
    name: FastAPI Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run API integration tests
        env:
          MLFLOW_TRACKING_URI: "sqlite:///mlruns.db"
          PYTHONPATH: "src"
        run: |
          uv run pytest tests/integration/test_api.py -v --tb=short

  # ── Deploy to ECS (push to main only) ─────────────────────────────────────
  deploy-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: test-api
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Force ECS service redeployment
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER || 'loan-risk-cluster' }}" \
            --service "${{ vars.ECS_SERVICE || 'loan-risk-serving' }}" \
            --force-new-deployment \
            --region "${{ vars.AWS_REGION || 'us-east-1' }}"

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER || 'loan-risk-cluster' }}" \
            --services "${{ vars.ECS_SERVICE || 'loan-risk-serving' }}" \
            --region "${{ vars.AWS_REGION || 'us-east-1' }}"
          echo "ECS service is stable." >> $GITHUB_STEP_SUMMARY
