# Continuous Integration Workflow
# ================================
# Runs on every push and PR:
#   1. Lint (ruff)
#   2. Unit tests
#   3. On main branch: build + push Docker image to ECR
#
# ECR push uses OIDC (no long-lived AWS credentials).
# Requires GitHub Actions secrets:
#   AWS_ROLE_ARN — IAM role ARN with ECR push permissions

name: CI — Lint & Unit Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint with ruff
        run: uv run ruff check src/ scripts/ sagemaker/
        continue-on-error: false

      - name: Check formatting
        run: uv run ruff format --check src/ scripts/ sagemaker/
        continue-on-error: true

      - name: Run unit tests
        env:
          MLFLOW_TRACKING_URI: "sqlite:///mlruns.db"
          MLFLOW__TRACKING_URI: "sqlite:///mlruns.db"
          PYTHONPATH: "src"
        run: |
          uv run pytest tests/unit/ \
            -v \
            --tb=short \
            --no-header \
            -p no:warnings

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: .coverage
          retention-days: 7

  # ── Push Docker image to ECR (main branch only) ────────────────────────────
  build-and-push-ecr:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/aws') && github.event_name == 'push'

    permissions:
      id-token: write   # Required for OIDC
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: loan-risk-serving
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag  $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                      $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
