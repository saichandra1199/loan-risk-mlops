# Training Pipeline Workflow
# ==========================
# Triggers a SageMaker Pipeline execution (replaces DVC + GitHub-hosted runner).
#
# What it does:
#   1. Authenticates to AWS via OIDC
#   2. Upserts the SageMaker Pipeline definition (from sagemaker/pipeline.py)
#   3. Starts a pipeline execution and waits for completion
#   4. Publishes metrics summary to GitHub Actions job summary
#
# When does this run?
#   - Manually: Actions → Training Pipeline → Run workflow
#   - Automatically: Every Sunday at 02:00 UTC (weekly retraining with HPO)
#
# Required GitHub Actions secrets:
#   AWS_ROLE_ARN              — IAM role ARN for SageMaker execution
# Required GitHub Actions variables:
#   AWS_REGION                — default: us-east-1
#   SAGEMAKER_ROLE_ARN        — IAM role for SageMaker Pipeline steps

name: Training Pipeline (SageMaker)

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: "Model to train"
        required: false
        default: "lgbm"
        type: choice
        options:
          - lgbm
          - xgboost
      n_trials:
        description: "HPO trials (0 = skip tuning)"
        required: false
        default: "0"
        type: string
      skip_tuning:
        description: "Skip hyperparameter tuning"
        required: false
        default: true
        type: boolean

  schedule:
    - cron: "0 2 * * 0"   # Sundays 02:00 UTC — weekly retrain with HPO

concurrency:
  group: training
  cancel-in-progress: false

jobs:
  trigger-sagemaker:
    name: Trigger SageMaker Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Upsert SageMaker Pipeline definition
        env:
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          SAGEMAKER_ROLE_ARN: ${{ vars.SAGEMAKER_ROLE_ARN }}
          AWS_DATA_BUCKET: ${{ vars.AWS_DATA_BUCKET }}
          AWS_ARTIFACTS_BUCKET: ${{ vars.AWS_ARTIFACTS_BUCKET }}
          PYTHONPATH: "src"
        run: |
          uv run python sagemaker/pipeline.py --upsert

      - name: Start pipeline execution
        id: start-execution
        env:
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          PYTHONPATH: "src"
        run: |
          SKIP_TUNING="${{ github.event.inputs.skip_tuning || 'true' }}"
          N_TRIALS="${{ github.event.inputs.n_trials || '0' }}"
          MODEL_TYPE="${{ github.event.inputs.model_name || 'lgbm' }}"

          # Weekly cron: enable HPO
          if [ "${{ github.event_name }}" = "schedule" ]; then
            SKIP_TUNING="false"
            N_TRIALS="50"
          fi

          uv run python sagemaker/pipeline.py --upsert --execute \
            --model-type "$MODEL_TYPE" \
            $([ "$SKIP_TUNING" = "true" ] && echo "--skip-tuning" || echo "") \
            --n-trials "$N_TRIALS" 2>&1 | tee execution_output.txt

          # Extract execution ARN
          EXECUTION_ARN=$(grep -o 'arn:aws:sagemaker:[^[:space:]]*' execution_output.txt | head -1)
          echo "execution_arn=$EXECUTION_ARN" >> $GITHUB_OUTPUT
          echo "Execution ARN: $EXECUTION_ARN"

      - name: Wait for pipeline completion
        env:
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          PYTHONPATH: "src"
        run: |
          EXECUTION_ARN="${{ steps.start-execution.outputs.execution_arn }}"
          if [ -z "$EXECUTION_ARN" ]; then
            echo "No execution ARN captured — skipping wait"
            exit 0
          fi
          uv run python sagemaker/run_pipeline.py status "$EXECUTION_ARN"

      - name: Fetch and display metrics
        if: always()
        env:
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
        run: |
          echo "## SageMaker Pipeline Execution" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Execution ARN: \`${{ steps.start-execution.outputs.execution_arn }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Model type: \`${{ github.event.inputs.model_name || 'lgbm' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Skip tuning: \`${{ github.event.inputs.skip_tuning || 'true' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Attempt to download evaluation report from S3
          BUCKET="${{ vars.AWS_ARTIFACTS_BUCKET }}"
          if [ -n "$BUCKET" ]; then
            aws s3 cp "s3://$BUCKET/evaluation/metrics.json" metrics.json 2>/dev/null || true
            if [ -f "metrics.json" ]; then
              echo "### Model Metrics" >> $GITHUB_STEP_SUMMARY
              echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
              echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
              python3 -c "
          import json
          metrics = json.load(open('metrics.json'))
          for key, value in metrics.items():
              if isinstance(value, float):
                  print(f'| {key} | {value:.4f} |')
              else:
                  print(f'| {key} | {value} |')
              " >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Report failure
        if: failure()
        run: |
          echo "## Pipeline Failed" >> $GITHUB_STEP_SUMMARY
          echo "Check the SageMaker console for detailed logs." >> $GITHUB_STEP_SUMMARY
          echo "Execution ARN: ${{ steps.start-execution.outputs.execution_arn }}" >> $GITHUB_STEP_SUMMARY
